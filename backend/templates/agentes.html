{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Agentes</h2>

        <a href="/agentes/novo" class="btn btn-primary">
            Novo Agente
        </a>

    </div>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Código CCEE</th>
                <th>Nome</th>
                <th>CNPJ</th>
                <th>Tipo</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

        {% for agente in agentes %}

            <tr>

                <td>{{ agente.id }}</td>
                <td>{{ agente.codigo_ccee }}</td>
                <td>{{ agente.nome }}</td>
                <td>{{ agente.cnpj }}</td>
                <td>{{ agente.tipo_agente }}</td>
                <td>{{ agente.status }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
