{% extends 'base.html' %}

{% block content %}

<div class="page fade-in">


    <h2 class="page-title">
        Medições
    </h2>


    <p class="subtitle">
        Gestão dos ativos de medição e dados registrados pela CCEE.
    </p>



    <div class="row">


        <div class="col-lg-4 mb-4">

            <div class="card indicator-card">

                <div>

                    <div class="indicator-title">
                        Ativos de Medição
                    </div>

                    <div class="indicator-value">
                        --
                    </div>

                </div>


                <div class="indicator-icon">

                    <i class="bi bi-speedometer"></i>

                </div>


            </div>

        </div>




        <div class="col-lg-4 mb-4">

            <div class="card indicator-card">

                <div>

                    <div class="indicator-title">
                        Energia Medida
                    </div>

                    <div class="indicator-value">
                        --
                    </div>

                </div>


                <div class="indicator-icon">

                    <i class="bi bi-lightning-charge"></i>

                </div>


            </div>

        </div>




        <div class="col-lg-4 mb-4">

            <div class="card indicator-card">

                <div>

                    <div class="indicator-title">
                        Última Sincronização
                    </div>

                    <div class="indicator-value">
                        --
                    </div>

                </div>


                <div class="indicator-icon">

                    <i class="bi bi-arrow-repeat"></i>

                </div>


            </div>

        </div>


    </div>





    <div class="table-container">


        <h5 class="text-primary mb-4">
            Histórico de Medições
        </h5>



        <table class="table">


            <thead>

                <tr>

                    <th>
                        Data
                    </th>


                    <th>
                        Agente
                    </th>


                    <th>
                        Ativo
                    </th>


                    <th>
                        Energia MWh
                    </th>


                    <th>
                        Origem
                    </th>


                </tr>


            </thead>



            <tbody>


                <tr>

                    <td colspan="5" class="text-center">

                        Aguardando integração CCEE

                    </td>


                </tr>


            </tbody>


        </table>


    </div>



</div>


{% endblock %}
